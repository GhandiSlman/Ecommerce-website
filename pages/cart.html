<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/header.css" />
    <link rel="stylesheet" href="../css/footer.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="../css/pages/cart.css" />
  </head>
  <body
    style="
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      align-items: center;
    "
  >
    <header class="flex">
      <a href="/" class="logo">
        <i class="fa-solid fa-bag-shopping"> </i>
        <span style="font-weight: bold">AWU</span>
        <p style="letter-spacing: 2px">Shopping</p>
      </a>

      <div class="links">
        <a style="position: relative" class="cart" href="">
          <i class="fa-solid fa-cart-shopping"></i>
          $0.00
          <span class="products-number">2</span>
        </a>
        <a class="sign-in" href="./signin.html">
          <i class="fa-solid fa-right-to-bracket"></i>
          Sign in</a
        >
        <a class="register" href="./register.html">
          <i class="fa-solid fa-user-plus"></i>
          Register</a
        >
      </div>
    </header>
    <main style="text-align: center" class="">
      <section class="cart">
        <article class="product flex">
          <button>
            <i class="fa-solid fa-trash-can"></i>
          </button>
          <p class="price">$133</p>
          <div class="flex" style="margin-right: 1rem">
            <button class="decrease">-</button>
            <div class="quantity">3</div>

            <button class="increase">+</button>
          </div>
          <p class="title">Product Title</p>

          <img
            style="border-radius: 0.2rem"
            src="../images/1.png"
            alt=""
            width="70px"
            height="70px"
          />
        </article>
        <article class="product flex">
          <button>
            <i class="fa-solid fa-trash-can"></i>
          </button>
          <p class="price">$133</p>
          <div class="flex" style="margin-right: 1rem">
            <button class="decrease">-</button>
            <div class="quantity">3</div>

            <button class="increase">+</button>
          </div>
          <p class="title">Product Title</p>

          <img
            style="border-radius: 0.2rem"
            src="../images/2.webp"
            alt=""
            width="70px"
            height="70px"
          />
        </article>
        <article class="product flex">
          <button>
            <i class="fa-solid fa-trash-can"></i>
          </button>
          <p class="price">$133</p>
          <div class="flex" style="margin-right: 1rem">
            <button class="decrease">-</button>
            <div class="quantity">3</div>

            <button class="increase">+</button>
          </div>
          <p class="title">Product Title</p>

          <img
            style="border-radius: 0.2rem"
            src="../images/3.webp"
            alt=""
            width="70px"
            height="70px"
          />
        </article>
      </section>
      <button class="clear">
        <i class="fa-solid fa-trash-can" style="color: white"></i>
        Clear cart
      </button>

      <section class="summary">
        <h1>Cart Summary</h1>
        <div class="flex">
          <p class="subtotal">Subtotal</p>
          <p>$1999</p>
        </div>
        <button disabled class="checkout">CHECKOUT</button>
        <a href="../pages/signin.html">Please sign in to continue.</a>
      </section>
    </main>
    <footer>
      Designed and developed by
      <span>Ghandi Alslman</span>
      @ 2026.
    </footer>
  </body>
</html>

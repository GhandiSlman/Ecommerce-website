<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="../css/global.css" />
    <link rel="stylesheet" href="../css/pages/register.css" />
    <link rel="stylesheet" href="../css/header.css" />
    <link rel="stylesheet" href="../css/footer.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body class="cover-content">
    <header class="flex">
      <a href="/" class="logo">
        <i class="fa-solid fa-bag-shopping"> </i>
        <span style="font-weight: bold">AWU</span>
        <p style="letter-spacing: 2px">Shopping</p>
      </a>

      <div class="links">
        <a style="position: relative" class="cart" href="/pages/cart.html">
          <i class="fa-solid fa-cart-shopping"></i>
          $0.00
          <span class="products-number">2</span>
        </a>
        <a class="sign-in" href="./signin.html">
          <i class="fa-solid fa-right-to-bracket"></i>
          Sign in</a
        >
        <a class="register" href="./register.html">
          <i class="fa-solid fa-user-plus"></i>
          Register</a
        >
      </div>
    </header>
    <form class="form">
      <form action="">
        <div class="name-title">User name</div>
        <input class="name-field" type="text" />
        <div class="email-title">Email address</div>
        <input class="email-field" type="email" />
        <div class="password-title">Password</div>
        <input class="password-field" type="password" />
        <div class="flex">
          <input class="checkbox" type="checkbox" />
          <p class="check-me-out">Check me out</p>
        </div>
        <button class="submit">Create Account</button>
      </form>
    </form>
    <ul class="social-links flex">
      
      <li>
        <a href="">
          <i class="fa-brands fa-google"></i>
          <span>Google</span>
        </a>
      </li>

      <li>
        <a href="">
          <i class="fa-brands fa-github"></i>
          <span>Github</span>
        </a>
      </li>
<li>
        <a href="">
          <i class="fa-brands fa-facebook"></i>
          <span>Facebook</span>
        </a>
      </li>
      <li>
        <a href="">
          <i class="fa-brands fa-apple"></i>
          <span>Apple</span>
        </a>
      </li>
    </ul>
    <footer>
      Designed and developed by
      <span>Ghandi Alslman</span>
      @ 2026.
    </footer>
  </body>
</html>
